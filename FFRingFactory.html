          <div style={{
            position:"absolute", top:"100%", left:0, right:0, zIndex:50,
            background:T.panel, border:`1px solid ${T.borderHi}`,
            borderRadius:7, marginTop:4, overflow:"hidden",
            boxShadow:"0 8px 24px rgba(0,0,0,0.4)",
          }}>
            {results.map((p,i)=>(
              <div key={i} onClick={()=>select(p)}
                style={{
                  padding:"10px 14px", cursor:"pointer", display:"flex",
                  alignItems:"center", gap:10,
                  borderBottom:i<results.length-1?`1px solid ${T.border}`:"none",
                  background:"transparent",
                  transition:"background 0.1s",
                }}
                onMouseEnter={e=>e.currentTarget.style.background=T.surface}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}
              >
                <PosChip pos={p.pos} sm/>
                <span style={{fontSize:13,fontWeight:500,color:T.text,fontFamily:T.font,flex:1}}>{p.name}</span>
                <span style={{fontSize:10,color:T.textMute,fontFamily:T.font}}>{p.pos}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Player card */}
      {selected && (() => {
        const cats = SAVANT_CATS[selected.pos] || {};
        const pc = posColor(selected.pos);
        return (
          <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden",marginTop:8}}>
            {/* Player header */}
            <div style={{
              padding:"16px 20px", borderBottom:`1px solid ${T.border}`,
              background:`linear-gradient(135deg, ${pc}10, ${T.surface})`,
              display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10,
            }}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{
                  width:44,height:44,borderRadius:"50%",
                  background:`linear-gradient(135deg, ${pc}, ${pc}88)`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:15,fontWeight:800,color:"#fff",fontFamily:T.font,
                }}>
                  {selected.name.split(" ").map(w=>w[0]).join("").slice(0,2)}
                </div>
                <div>
                  <div style={{fontSize:20,fontWeight:700,color:T.text,fontFamily:T.font,lineHeight:1.1}}>{selected.name}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
                    <PosChip pos={selected.pos}/>
                  </div>
                  {/* Year selector */}
                  <div style={{display:"flex",gap:5,marginTop:8}}>
                    {YEARS.map(y=>(
                      <button key={y} onClick={()=>setYear(y)} style={{
                        padding:"3px 10px",borderRadius:4,fontSize:11,fontWeight:700,
                        cursor:"pointer",fontFamily:T.fontMono,border:"none",
                        background: year===y ? pc : T.border,
                        color: year===y ? "#fff" : T.textMute,
                        transition:"background 0.15s, color 0.15s",
                      }}>{y}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:T.textMute,letterSpacing:0.8,fontFamily:T.font,fontWeight:600,marginBottom:2}}>{year} PERCENTILE RANKINGS</div>
                <div style={{fontSize:10,color:T.textMute,fontFamily:T.font}}>vs all {selected.pos}s in database</div>
              </div>
            </div>

            {/* Scale header */}
            <div style={{padding:"10px 20px 4px", display:"flex", alignItems:"center", gap:10}}>
              <div style={{width:160,flexShrink:0}}/>
              <div style={{flex:1,display:"flex",justifyContent:"space-between",paddingRight:38}}>
                <span style={{fontSize:9,fontWeight:700,color:"#2980b9",letterSpacing:0.8,fontFamily:T.font}}>POOR</span>
                <span style={{fontSize:9,fontWeight:700,color:T.textMute,letterSpacing:0.8,fontFamily:T.font}}>AVERAGE</span>
                <span style={{fontSize:9,fontWeight:700,color:"#c0392b",letterSpacing:0.8,fontFamily:T.font}}>ELITE</span>
              </div>
            </div>

            {/* Stat sections */}
            <div style={{padding:"8px 20px 20px"}}>
              {Object.entries(cats).map(([catName, statList]) => (
                <div key={catName} style={{marginBottom:20}}>
                  <div style={{
                    fontSize:13, fontWeight:700, color:T.text, fontFamily:T.font,
                    marginBottom:8, paddingBottom:6,
                    borderBottom:`2px solid ${pc}44`,
                    display:"flex", alignItems:"center", gap:8,
                  }}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:pc,display:"inline-block",flexShrink:0}}/>
                    {catName}
                  </div>
                  {statList.map(stat => {
                    const statData = (selected.stats[year]||{})[stat];
                    if (!statData) return null;
                    return <StatRow key={stat} label={stat} pct={statData.pct ?? 50} raw={statData.raw}/>;
                  })}
                </div>
              ))}
            </div>

            {/* Footer note */}
            <div style={{padding:"10px 20px",borderTop:`1px solid ${T.border}`,background:T.surface}}>
              <span style={{fontSize:10,color:T.textMute,fontFamily:T.font}}>
                ⚡ Data represents {year} season statistics. Percentiles calculated against all qualifying {selected.pos}s in the database.
              </span>
            </div>
          </div>
        );
      })()}

      {!selected && (
        <div style={{marginTop:32,textAlign:"center",padding:"40px 20px",background:T.panel,border:`1px solid ${T.border}`,borderRadius:8}}>
          <div style={{fontSize:28,marginBottom:12}}>🏈</div>
          <div style={{fontSize:15,fontWeight:600,color:T.text,fontFamily:T.font,marginBottom:6}}>Search any fantasy football player</div>
          <div style={{fontSize:12,color:T.textMute,fontFamily:T.font,maxWidth:360,margin:"0 auto"}}>
            Type a player name or NFL team above to pull up their advanced percentile profile — {Object.keys(SAVANT_DATA).length} players in the database across QB, RB, WR, and TE.
          </div>
        </div>
      )}
    </div>
  );
}


function StatSavant() {
  const [savantTab, setSavantTab] = useState("player");
  const TABS = [
    { id:"player", label:"Player Savant", sub:"Individual percentile profiles" },
    { id:"team",   label:"Team Savant",   sub:"Team offensive metrics" },
  ];
  return (
    <div>
      {/* Sub-tabs */}
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${T.border}`,marginBottom:20,overflowX:"auto"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setSavantTab(t.id)} style={{padding:"10px 20px",background:"none",border:"none",cursor:"pointer",fontFamily:T.font,flexShrink:0,borderBottom:savantTab===t.id?`2px solid ${T.blue}`:"2px solid transparent",marginBottom:-1}}>
            <div style={{fontSize:12,fontWeight:600,color:savantTab===t.id?T.text:T.textSub,whiteSpace:"nowrap"}}>{t.label}</div>
            <div style={{fontSize:10,color:savantTab===t.id?T.blue:T.textMute,marginTop:1,whiteSpace:"nowrap"}}>{t.sub}</div>
          </button>
        ))}
      </div>
      {savantTab==="player" && <PlayerSavant/>}
      {savantTab==="team"   && <TeamSavant/>}
    </div>
  );
}

const NAV = [
  {id:"home",     label:"Home"},
  {id:"savant",   label:"Stat Savant"},
  {id:"trade",    label:"Trade Analyzer"},
  {id:"startsit", label:"Start / Sit"},
  {id:"draft",    label:"Draft Center"},
  {id:"rankings", label:"Rankings"},
  {id:"betting",  label:"Betting Center"},
];

const PAGE_TITLES = {
  home:"Home", savant:"Stat Savant", trade:"Trade Analyzer", startsit:"Start / Sit",
  draft:"Draft Center", rankings:"Rankings Builder", betting:"Betting Center",
};

export default function FFRingFactory() {
  const [page, setPage]               = useState("home");
  const [scoring, setScoring]         = useState("PPR");
  const [showAdminGate, setShowAdminGate] = useState(false);
  const [showAdmin, setShowAdmin]     = useState(false);
  const [adminAuthed, setAdminAuthed] = useState(false);

  const openAdmin = () => adminAuthed ? setShowAdmin(true) : setShowAdminGate(true);
  const onAdminOk = () => { setAdminAuthed(true); setShowAdmin(true); };

  // Tell Wix iframe to resize to our content height
  const resizeRef = useRef(null);
  useEffect(() => {
    const el = resizeRef.current;
    if (!el) return;
    const ro = new ResizeObserver(() => {
      try { window.parent.postMessage({type:"wix-height",height:el.scrollHeight}, "*"); } catch {}
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  return (
    <div ref={resizeRef} style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:T.font}}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet"/>

      {showAdminGate && <AdminGate onSuccess={onAdminOk} onClose={()=>setShowAdminGate(false)}/>}
      {showAdmin     && <AdminPanel onClose={()=>setShowAdmin(false)}/>}

      {/* TOP BAR */}
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",height:48,gap:12}}>
          {/* Logo */}
          <div onClick={()=>setPage("home")} style={{cursor:"pointer",flexShrink:0,marginRight:4}}>
            <div style={{fontSize:8,color:T.blue,letterSpacing:2.5,fontWeight:700,lineHeight:1,fontFamily:T.font}}>FF RING FACTORY</div>
            <div style={{fontSize:11,fontWeight:600,color:T.textSub,letterSpacing:0.3,lineHeight:1.2,fontFamily:T.font}}>Fantasy Tools</div>
          </div>

          <div style={{width:1,height:20,background:T.border,flexShrink:0}}/>

          {/* Nav */}
          <nav style={{display:"flex",gap:1,flex:1,overflowX:"auto"}}>
            {NAV.map(item=>(
              <button key={item.id} onClick={()=>setPage(item.id)} style={{
                padding:"0 12px",height:48,fontSize:12,fontWeight:page===item.id?600:400,
                fontFamily:T.font,color:page===item.id?T.text:T.textSub,
                background:"none",border:"none",borderBottom:page===item.id?`2px solid ${T.blue}`:"2px solid transparent",
                cursor:"pointer",whiteSpace:"nowrap",transition:"color 0.1s",flexShrink:0,
              }}>{item.label}</button>
            ))}
          </nav>

          {/* Scoring */}
          <div style={{display:"flex",background:T.bg,border:`1px solid ${T.border}`,borderRadius:5,padding:2,gap:1,flexShrink:0}}>
            {[["PPR","PPR"],["Half PPR","½ PPR"],["Standard","Std"]].map(([val,lbl])=>(
              <button key={val} onClick={()=>setScoring(val)} style={{
                padding:"3px 9px",borderRadius:3,fontSize:11,fontWeight:600,fontFamily:T.font,
                cursor:"pointer",border:"none",background:scoring===val?T.blue:"transparent",
                color:scoring===val?"#fff":T.textSub,transition:"all 0.1s",
              }}>{lbl}</button>
            ))}
          </div>

          {/* Admin */}
          <button onClick={openAdmin} title="Admin" style={{background:"none",border:`1px solid ${T.border}`,borderRadius:4,color:adminAuthed?T.amber:T.textMute,cursor:"pointer",padding:"4px 9px",fontSize:12,fontFamily:T.font,flexShrink:0,fontWeight:600}}>Admin</button>
        </div>
      </div>

      {/* BODY */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px 60px"}}>
        {page!=="home" && (
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16,fontSize:12,color:T.textMute,fontFamily:T.font}}>
            <span onClick={()=>setPage("home")} style={{cursor:"pointer",color:T.blue}}>Home</span>
            <span>&#8250;</span>
            <span style={{color:T.textSub}}>{PAGE_TITLES[page]}</span>
          </div>
        )}

        {page==="home"     && <HomePage setPage={setPage}/>}
        {page==="trade"    && (
          <div>
            <SectionTitle sub={`Values calculated using ${scoring} scoring`}>Trade Analyzer</SectionTitle>
            <TradeAnalyzer scoring={scoring}/>
          </div>
        )}
        {page==="startsit" && (
          <div>
            <SectionTitle sub="Preseason — Updated Weekly">Start / Sit</SectionTitle>
            <StartSit scoring={scoring} userRoster={[]}/>
          </div>
        )}
        {page==="draft"    && (
          <div>
            <SectionTitle sub="2026 Fantasy Football Draft Guide">Draft Center</SectionTitle>
            <DraftAnalyzer scoring={scoring}/>
          </div>
        )}
        {page==="rankings" && <RankingsPage/>}
        {page==="savant"   && (
          <div>
            <SectionTitle sub="Advanced percentile metrics for every fantasy-relevant player">Stat Savant</SectionTitle>
            <StatSavant/>
          </div>
        )}
        {page==="betting"  && (
          <div>
            <SectionTitle sub="FFRF staff picks — entertainment only, not gambling advice">Betting Center</SectionTitle>
            <BettingCenter/>
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{borderTop:`1px solid ${T.border}`,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <span style={{fontSize:11,color:T.textMute,fontFamily:T.font}}>FF Ring Factory &middot; ffringfactory.com &middot; @ffringfactory</span>
        <span style={{fontSize:11,color:T.textMute,fontFamily:T.font}}>Projections are for entertainment purposes only</span>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FFRingFactory/>);
  </script>
</body>
</html>
